<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 takeaways promise — WebExpo 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Ubuntu:wght@400;500;700&family=Bree+Serif&display=swap" rel="stylesheet">

  <style>
    :root {
      --turquoise: #2CE5C6;
      --dark-teal: #17252A;
      --white: #FFFFFF;
      --font-display: 'Quicksand', system-ui, sans-serif;
      --font-body: 'Ubuntu', system-ui, sans-serif;
      --font-accent: 'Bree Serif', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deck {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      background: var(--dark-teal);
      overflow: hidden;
      container-type: inline-size;
    }

    .takeaways {
      position: absolute;
      inset: 0;
      padding: 5cqw 9cqw;
      display: grid;
      grid-template-columns: 35cqw 1fr;
      grid-template-rows: 1fr auto;
      column-gap: 7cqw;
      row-gap: 3cqw;
    }

    /* ── Left column: label + headline ──────────────── */

    .takeaways__intro {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 2.5cqw;
    }

    .takeaways__label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1.4cqw;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--turquoise);
      opacity: 0;
      transform: translateY(0.4cqw);
      animation: rise 0.7s 0.1s forwards ease-out;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .takeaways__headline {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 4cqw;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--white);
      text-transform: lowercase;
      margin: 0;
    }

    .takeaways__headline .line {
      display: block;
      white-space: nowrap;
      opacity: 0;
      filter: blur(1cqw);
      transform: translateY(0.4cqw);
      animation: focusIn 0.85s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }

    .takeaways__headline .line--1 { animation-delay: 0.4s; }
    .takeaways__headline .line--2 { animation-delay: 0.8s; }
    .takeaways__headline .line--3 { animation-delay: 1.2s; }

    @keyframes focusIn {
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    .takeaways__headline .accent { color: var(--turquoise); }

    /* ── Right column: list ─────────────────────────── */

    .takeaways__list {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2.5cqw;
      max-width: 100%;
    }

    .takeaways__list li {
      display: flex;
      align-items: flex-start;
      gap: 2.2cqw;
      opacity: 0;
      transform: translateX(-1cqw);
      animation: slideIn 0.7s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }

    .takeaways__list li:nth-child(1) { animation-delay: 1.8s; }
    .takeaways__list li:nth-child(2) { animation-delay: 2.1s; }
    .takeaways__list li:nth-child(3) { animation-delay: 2.4s; }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .takeaways__list .num {
      flex: none;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5cqw;
      letter-spacing: 0.05em;
      color: var(--turquoise);
      font-variant-numeric: tabular-nums;
      width: 2.8cqw;
      padding-top: 0.5cqw;
    }

    .takeaways__list .body {
      display: flex;
      flex-direction: column;
      gap: 0.4cqw;
      min-width: 0;
    }

    .takeaways__list .title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 2.5cqw;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--white);
      text-transform: lowercase;
      white-space: nowrap;
    }

    .takeaways__list .desc {
      font-family: var(--font-accent);
      font-size: 1.4cqw;
      line-height: 1.4;
      color: var(--white);
      opacity: 0.78;
    }

    .takeaways__list .desc .line {
      display: block;
      white-space: nowrap;
    }

    /* ── Footer ─────────────────────────────────────── */

    .takeaways__footer {
      grid-column: 1 / span 2;
      grid-row: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: rise 0.9s 3.0s forwards ease-out;
    }

    .takeaways__brand {
      display: flex;
      align-items: center;
      gap: 1.6cqw;
    }

    .takeaways__logo {
      height: 3cqw;
      width: auto;
      opacity: 0.85;
    }

    .takeaways__handle {
      font-family: var(--font-body);
      font-size: 1.3cqw;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0.65;
      white-space: nowrap;
    }

    .takeaways__pager {
      font-family: var(--font-body);
      font-size: 1.2cqw;
      letter-spacing: 0.18em;
      color: var(--white);
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
    }

    /* Half-dots */
    .half-dots {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 36cqw;
      width: 4.4cqw;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .half-dots .dot {
      width: 4.4cqw;
      height: 4.4cqw;
      background: var(--turquoise);
      border-radius: 50%;
      transform: translateX(50%) translateY(-1cqw);
      opacity: 0;
    }

    .half-dots .dot--1 { animation: dotDrop 0.7s 0.7s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    .half-dots .dot--2 { animation: dotDrop 0.7s 0.9s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    .half-dots .dot--3 { animation: dotDrop 0.7s 1.1s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes dotDrop {
      to { transform: translateX(50%) translateY(0); opacity: 1; }
    }

    /* Replay control */
    .replay {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.4;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      z-index: 100;
    }
    .replay:hover { opacity: 0.85; border-color: var(--turquoise); }
  </style>
</head>
<body>

  <div class="stage">
    <div class="deck">
      <section class="takeaways" id="takeawaysSlide">

        <div class="takeaways__intro">
          <div class="takeaways__label">what you'll take away</div>
          <h1 class="takeaways__headline">
            <span class="line line--1">by the end</span>
            <span class="line line--2">of this talk,</span>
            <span class="line line--3">you'll <span class="accent">have</span>:</span>
          </h1>
        </div>

        <ol class="takeaways__list">
          <li>
            <span class="num">01</span>
            <div class="body">
              <span class="title">a method</span>
              <span class="desc">
                <span class="line">to read your funnel in five minutes.</span>
              </span>
            </div>
          </li>
          <li>
            <span class="num">02</span>
            <div class="body">
              <span class="title">pattern recognition</span>
              <span class="desc">
                <span class="line">the three types of leaks every saas funnel has.</span>
              </span>
            </div>
          </li>
          <li>
            <span class="num">03</span>
            <div class="body">
              <span class="title">your first move</span>
              <span class="desc">
                <span class="line">the exact thing to test tomorrow morning.</span>
              </span>
            </div>
          </li>
        </ol>

        <div class="takeaways__footer">
          <div class="takeaways__brand">
            <img class="takeaways__logo" src="../assets/png/PMN_v2.png" alt="Pretty Much Nomads">
            <span class="takeaways__handle">vladana bačová</span>
          </div>
          <span class="takeaways__pager">3 / 24</span>
        </div>

        <div class="half-dots" aria-hidden="true">
          <span class="dot dot--1"></span>
          <span class="dot dot--2"></span>
          <span class="dot dot--3"></span>
        </div>

      </section>
    </div>
  </div>

  <button class="replay" id="replay">replay animation</button>

  <script>
    function bindReplay() {
      document.getElementById('replay').addEventListener('click', () => {
        const slide = document.getElementById('takeawaysSlide');
        const clone = slide.cloneNode(true);
        slide.parentNode.replaceChild(clone, slide);
        clone.id = 'takeawaysSlide';
        bindReplay();
      });
    }
    bindReplay();
  </script>

</body>
</html>
