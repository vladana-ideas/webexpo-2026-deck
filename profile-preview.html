<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous profile preview — WebExpo 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Ubuntu:wght@400;500;700&family=Bree+Serif&display=swap" rel="stylesheet">

  <style>
    :root {
      --turquoise: #2CE5C6;
      --dark-teal: #17252A;
      --white: #FFFFFF;
      --font-display: 'Quicksand', system-ui, sans-serif;
      --font-body: 'Ubuntu', system-ui, sans-serif;
      --font-accent: 'Bree Serif', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deck {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      background: var(--dark-teal);
      overflow: hidden;
      container-type: inline-size;
    }

    .profile {
      position: absolute;
      inset: 0;
      padding: 5cqw 9cqw;
      display: grid;
      grid-template-columns: 33cqw 1fr;
      grid-template-rows: auto 1fr auto;
      column-gap: 7cqw;
      row-gap: 2cqw;
    }

    /* ── Section label (top, full width) ────────────── */

    .profile__label {
      grid-column: 1 / span 2;
      grid-row: 1;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1.4cqw;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--turquoise);
      opacity: 0;
      transform: translateY(0.4cqw);
      animation: rise 0.7s 0.1s forwards ease-out;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Left column: title + meta ──────────────────── */

    .profile__title-block {
      grid-column: 1;
      grid-row: 2;
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 1.5cqw;
    }

    .profile__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 5.5cqw;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--white);
      text-transform: lowercase;
      margin: 0;
      opacity: 0;
      filter: blur(1.2cqw);
      transform: translateY(0.4cqw);
      animation: focusIn 0.9s 0.4s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes focusIn {
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    .profile__title .accent { color: var(--turquoise); }

    .profile__sub {
      font-family: var(--font-accent);
      font-size: 1.6cqw;
      color: var(--white);
      opacity: 0;
      animation: rise 0.8s 1.0s forwards ease-out;
    }

    .profile__sub .accent { color: var(--turquoise); }

    /* ── Right column: facts list ───────────────────── */

    .profile__facts {
      grid-column: 2;
      grid-row: 2;
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 1.6cqw;
      max-width: 100%;
    }

    .fact {
      display: grid;
      grid-template-columns: 9cqw 1fr;
      column-gap: 2.5cqw;
      align-items: baseline;
      opacity: 0;
      transform: translateX(-1cqw);
      animation: slideIn 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }

    .fact:nth-child(1) { animation-delay: 1.4s; }
    .fact:nth-child(2) { animation-delay: 1.6s; }
    .fact:nth-child(3) { animation-delay: 1.8s; }
    .fact:nth-child(4) { animation-delay: 2.0s; }
    .fact:nth-child(5) { animation-delay: 2.2s; }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .fact__label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1cqw;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--turquoise);
      padding-top: 0.4cqw;
    }

    .fact__value {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.7cqw;
      line-height: 1.35;
      color: var(--white);
      text-transform: lowercase;
      display: flex;
      flex-direction: column;
      gap: 0.2cqw;
    }

    .fact__value .line {
      display: block;
      white-space: nowrap;
    }

    /* ── Footer ─────────────────────────────────────── */

    .profile__footer {
      grid-column: 1 / span 2;
      grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: rise 0.9s 2.7s forwards ease-out;
    }

    .profile__brand {
      display: flex;
      align-items: center;
      gap: 1.6cqw;
    }

    .profile__logo {
      height: 3cqw;
      width: auto;
      opacity: 0.85;
    }

    .profile__handle {
      font-family: var(--font-body);
      font-size: 1.3cqw;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0.65;
      white-space: nowrap;
    }

    .profile__pager {
      font-family: var(--font-body);
      font-size: 1.2cqw;
      letter-spacing: 0.18em;
      color: var(--white);
      opacity: 0.5;
      font-variant-numeric: tabular-nums;
    }

    /* Half-dots */
    .half-dots {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 36cqw;
      width: 4.4cqw;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 0;
    }

    .half-dots .dot {
      width: 4.4cqw;
      height: 4.4cqw;
      background: var(--turquoise);
      border-radius: 50%;
      transform: translateX(50%) translateY(-1cqw);
      opacity: 0;
    }

    .half-dots .dot--1 { animation: dotDrop 0.7s 0.7s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    .half-dots .dot--2 { animation: dotDrop 0.7s 0.9s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    .half-dots .dot--3 { animation: dotDrop 0.7s 1.1s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes dotDrop {
      to { transform: translateX(50%) translateY(0); opacity: 1; }
    }

    /* Replay + switcher */
    .replay {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.4;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      z-index: 100;
    }
    .replay:hover { opacity: 0.85; border-color: var(--turquoise); }

    .switcher {
      position: fixed;
      bottom: 24px;
      left: 24px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }

    .switcher button {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.5;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
    }
    .switcher button.is-active {
      opacity: 1;
      border-color: var(--turquoise);
      color: var(--turquoise);
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="deck">
      <section class="profile" id="profileSlide">

        <div class="profile__label" id="label">section 3 · case 01</div>

        <div class="profile__title-block">
          <h1 class="profile__title" id="title">
            the <span class="accent">first</span> funnel.
          </h1>
          <div class="profile__sub" id="sub">
            anonymized profile<span class="accent"> · </span>real numbers.
          </div>
        </div>

        <dl class="profile__facts" id="facts">
          <!-- facts injected per variant -->
        </dl>

        <div class="profile__footer">
          <div class="profile__brand">
            <img class="profile__logo" src="../assets/png/PMN_v2.png" alt="Pretty Much Nomads">
            <span class="profile__handle">vladana bačová</span>
          </div>
          <span class="profile__pager" id="pager">8 / 24</span>
        </div>

        <div class="half-dots" aria-hidden="true">
          <span class="dot dot--1"></span>
          <span class="dot dot--2"></span>
          <span class="dot dot--3"></span>
        </div>

      </section>
    </div>
  </div>

  <div class="switcher" id="switcher">
    <button data-v="1" class="is-active">case 1 · acquisition</button>
    <button data-v="2">case 2 · conversion</button>
    <button data-v="3">case 3 · retention</button>
  </div>

  <button class="replay" id="replay">replay animation</button>

  <script>
    const variants = {
      1: {
        label: 'section 3 · case 01',
        title: ['the ', { accent: 'first' }, ' funnel.'],
        pager: '8 / 24',
        facts: [
          { label: 'industry',  values: ['b2b saas — data protection software.'] },
          { label: 'use cases', values: ['compliance, data breach discovery, audits.'] },
          { label: 'market',    values: ['north america and canada.'] },
          { label: 'team',      values: ['small, central europe-based.'] },
          { label: 'before',    values: ['no marketing function.', 'founder running product and sales.'] },
        ],
      },
      2: {
        label: 'section 4 · case 02',
        title: ['the ', { accent: 'second' }, ' funnel.'],
        pager: '14 / 24',
        facts: [
          { label: 'industry',  values: ['b2b saas — visual feedback and bug reporting.'] },
          { label: 'use cases', values: ['dev teams collecting bug reports.', 'agencies tracking client feedback.'] },
          { label: 'target',    values: ['small dev teams, agencies, freelancers.'] },
          { label: 'model',     values: ['hybrid — freemium + free trial.'] },
          { label: 'before',    values: ['solo-founder operation.', 'no marketing function.'] },
        ],
      },
      3: {
        label: 'section 5 · case 03',
        title: ['the ', { accent: 'third' }, ' funnel.'],
        pager: '19 / 24',
        facts: [
          { label: 'industry',  values: ['b2b saas — content marketing tool, early stage.'] },
          { label: 'use cases', values: ['content strategy, planning, approval workflow.'] },
          { label: 'scale',     values: ['10–20 paying customers throughout the year.'] },
          { label: 'team',      values: ['small, no marketing function.'] },
          { label: 'before',    values: ['no marketing activity.', 'something quietly going wrong.'] },
        ],
      },
    };

    function renderTitle(parts) {
      return parts.map(p => {
        if (typeof p === 'string') return p;
        return `<span class="accent">${p.accent}</span>`;
      }).join('');
    }

    function renderFacts(facts) {
      return facts.map(f => {
        const lines = f.values.map(v => `<span class="line">${v}</span>`).join('');
        return `
          <div class="fact">
            <dt class="fact__label">${f.label}</dt>
            <dd class="fact__value">${lines}</dd>
          </div>
        `;
      }).join('');
    }

    function applyVariant(v) {
      const data = variants[v];
      document.getElementById('label').textContent = data.label;
      document.getElementById('title').innerHTML = renderTitle(data.title);
      document.getElementById('pager').textContent = data.pager;
      document.getElementById('facts').innerHTML = renderFacts(data.facts);
      replayAnimation();
    }

    function replayAnimation() {
      const slide = document.getElementById('profileSlide');
      const clone = slide.cloneNode(true);
      slide.parentNode.replaceChild(clone, slide);
      clone.id = 'profileSlide';
    }

    document.querySelectorAll('#switcher button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#switcher button').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        applyVariant(btn.dataset.v);
      });
    });

    document.getElementById('replay').addEventListener('click', replayAnimation);

    applyVariant(1);
  </script>

</body>
</html>
